<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Ivy! ✨</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <!-- FontAwesome for high-quality icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles.css?v=22">
</head>
<body>
    <!-- Starry background canvas -->
    <canvas id="starfield"></canvas>

    <!-- Ambient Sound System (Toggleable) -->
    <button id="sound-toggle" class="audio-btn" aria-label="Toggle music">
        <i class="fas fa-volume-mute"></i>
    </button>

    <!-- Main Container -->
    <div class="envelope-wrapper">
        <!-- The Opening Cover / Envelope -->
        <div class="envelope" id="envelope">
            <div class="envelope-content">
                <div class="sparkle-icon"><i class="fas fa-sparkles"></i></div>
                <h2>A Special Delivery...</h2>
                <p>Click to open your birthday card</p>
                <button class="open-btn" id="open-card-btn">
                    <span>Open Card</span>
                    <i class="fas fa-envelope-open"></i>
                </button>
            </div>
            <!-- Twinkling stars on envelope -->
            <div class="env-deco env-star-1">★</div>
            <div class="env-deco env-star-2">✦</div>
            <div class="env-deco env-star-3">✦</div>
        </div>

        <!-- The Birthday Card Container -->
        <div class="birthday-card hidden" id="birthday-card">
            <div class="card-inner">
                <!-- Close/Reset Card Button -->
                <button class="reset-btn" id="reset-btn" title="Replay Animation">
                    <i class="fas fa-redo-alt"></i>
                </button>

                <!-- Top sparkle ornaments -->
                <div class="card-sparkle cs-1">✦</div>
                <div class="card-sparkle cs-2">★</div>

                <!-- Cake Area (SVG will be injected by JS) -->
                <div class="cake-container" id="cake-container">
                    <div class="cake-svg-wrapper" id="cake-svg-wrapper">
                        <!-- Candle + flames - positioned relative to wrapper -->
                        <div class="velas" id="velas">
                            <div class="fuego"></div>
                            <div class="fuego"></div>
                            <div class="fuego"></div>
                            <div class="fuego"></div>
                            <div class="fuego"></div>
                        </div>
                        <!-- SVG cake appended here by script.js -->
                    </div>
                </div>

                <!-- Birthday Greeting Typography -->
                <div class="text-content" id="text-content">
                    <h1 class="main-title" id="birthday-title">happy birthday!</h1>
                    
                    <!-- Creative Name "Ivy" Container -->
                    <div class="name-container">
                        <!-- Custom SVG ivy vine and leaves that wrap around the name "Ivy" -->
                        <svg class="ivy-vine-svg" viewBox="0 0 250 80" xmlns="http://www.w3.org/2000/svg">
                            <!-- Vine Path -->
                            <path id="vine-path" d="M 20,45 Q 60,35 125,43 T 230,40" fill="none" stroke="#2a4d33" stroke-width="2.5" stroke-dasharray="300" stroke-dashoffset="300" />
                            
                            <!-- Ivy Leaves positioned along the name -->
                            <g class="ivy-leaf leaf-1" transform="translate(45, 38) rotate(-45)">
                                <path d="M 0,0 C -8,-10 -15,-5 0,-22 C 15,-5 8,-10 0,0 Z" fill="#52b788" />
                                <path d="M 0,0 C -5,-8 -10,-4 0,-16 C 10,-4 5,-8 0,0 Z" fill="#74c69d" />
                            </g>
                            <g class="ivy-leaf leaf-2" transform="translate(100, 42) rotate(30)">
                                <path d="M 0,0 C -8,-10 -15,-5 0,-22 C 15,-5 8,-10 0,0 Z" fill="#2d6a4f" />
                                <path d="M 0,0 C -5,-8 -10,-4 0,-16 C 10,-4 5,-8 0,0 Z" fill="#40916c" />
                            </g>
                            <g class="ivy-leaf leaf-3" transform="translate(155, 39) rotate(-15)">
                                <path d="M 0,0 C -8,-10 -15,-5 0,-22 C 15,-5 8,-10 0,0 Z" fill="#52b788" />
                                <path d="M 0,0 C -5,-8 -10,-4 0,-16 C 10,-4 5,-8 0,0 Z" fill="#74c69d" />
                            </g>
                            <g class="ivy-leaf leaf-4" transform="translate(205, 41) rotate(60)">
                                <path d="M 0,0 C -8,-10 -15,-5 0,-22 C 15,-5 8,-10 0,0 Z" fill="#1b4332" />
                                <path d="M 0,0 C -5,-8 -10,-4 0,-16 C 10,-4 5,-8 0,0 Z" fill="#2d6a4f" />
                            </g>
                        </svg>
                        
                        <div class="name-ivy" id="name-ivy">Ivy</div>
                    </div>

                    <!-- Custom Birthday Wish Poem (Always visible) -->
                    <p class="wish-message" id="wish-message">
                        Gussa hogi toh phat jaogi,<br>
                        Shaant hogi toh jam jaogi,<br>
                        Jo bhi ho, baad mein meri hi lag jaayegi.
                    </p>
                </div>

                <!-- Video Overlay (shown after candle blowout) -->
                <div id="video-overlay" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; z-index:50; background:linear-gradient(160deg, #f2a0b3, #f7bfcc); border-radius:12px; justify-content:center; align-items:center; cursor:pointer;">
                    <!-- Loading Spinner -->
                    <div id="video-loader" style="position:absolute; display:flex; flex-direction:column; align-items:center; color:var(--text-dark); z-index:51;">
                        <i class="fas fa-spinner fa-spin" style="font-size:2rem; margin-bottom:10px;"></i>
                        <span style="font-weight:600; font-size:0.9rem;">Loading sweet moments...</span>
                    </div>
                    <!-- Play Button Overlay -->
                    <div id="video-play-btn" style="position:absolute; display:none; flex-direction:column; align-items:center; justify-content:center; z-index:52; background:rgba(255,255,255,0.9); width:75px; height:75px; border-radius:50%; box-shadow:0 8px 24px rgba(74,40,52,0.2); transition:transform 0.2s ease;">
                        <i class="fas fa-play" style="font-size:1.8rem; color:var(--text-dark); margin-left:4px;"></i>
                    </div>
                    <video id="birthday-video" style="width:100%; height:100%; object-fit:contain; border-radius:12px; opacity:0; transition:opacity 0.5s ease;" playsinline controls loop preload="auto">
                        <source src="birthday-video.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden audio element for ambient background music -->
    <audio id="bg-music" loop src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav"></audio>

    <!-- Audio Elements for Sound Effects -->
    <audio id="sfx-open" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>
    <audio id="sfx-thud" src="https://assets.mixkit.co/active_storage/sfx/2572/2572-84.wav" preload="auto"></audio>
    <audio id="sfx-whoosh" src="https://assets.mixkit.co/active_storage/sfx/2582/2582-84.wav" preload="auto"></audio>
    <audio id="sfx-celebrate" src="https://assets.mixkit.co/active_storage/sfx/2020/2020-84.wav" preload="auto"></audio>

    <!-- Canvas Confetti CDN -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Script -->
    <script src="script.js?v=22"></script>
</body>
</html>
